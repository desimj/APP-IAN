<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Projeto Ian">
<meta name="theme-color" content="#0F0F1A">

<title>Projeto Ian ⚡</title>

<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<!-- Fallback if Google Fonts fails -->
<style>
@font-face{font-family:'Bungee';font-style:normal;font-weight:400;font-display:swap;
src:local('Bungee Regular'),local('Bungee-Regular')}
@font-face{font-family:'Nunito Sans';font-style:normal;font-weight:400;font-display:swap;
src:local('Nunito Sans Regular'),local('NunitoSans-Regular')}
:root{--bg:#0F0F1A;--card:#1A1A2E;--card2:#222240;--border:#2D2D4A;--ng:#00FF87;--nb:#00D4FF;
--np:#A78BFA;--ny:#FFE600;--nr:#FF4D6A;--no:#FF8C00;--nk:#FF6BCB;--nt:#14F0C0;
--text:#E8E8F0;--text2:#9898B0;--text3:#5A5A78}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito Sans','Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
min-height:100dvh;overflow-x:hidden;padding-bottom:140px;
background-image:
  linear-gradient(rgba(0,255,135,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,255,135,.03) 1px,transparent 1px),
  radial-gradient(ellipse at 20% 50%,rgba(0,212,255,.06) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 20%,rgba(167,139,250,.06) 0%,transparent 50%),
  radial-gradient(ellipse at 50% 80%,rgba(0,255,135,.04) 0%,transparent 50%);
background-size:24px 24px,24px 24px,100% 100%,100% 100%,100% 100%}

/* floating game decorations */
body::before{content:'🎮  ⭐  💎  🏆  ⚡  🎯  🔥  ❤️  🎮  ⭐  💎  🏆  ⚡  🎯  🔥  ❤️';
position:fixed;top:0;left:0;right:0;height:100vh;pointer-events:none;z-index:0;
font-size:16px;opacity:.04;word-spacing:40px;line-height:80px;letter-spacing:20px;
overflow:hidden;text-align:justify;padding:20px}

/* pixel corner decorations */
.pixel-corners{position:relative}
.pixel-corners::before,.pixel-corners::after{content:'';position:absolute;width:8px;height:8px;
border-radius:2px;pointer-events:none;z-index:1}
.pixel-corners::before{top:-3px;left:-3px;background:var(--ng);box-shadow:10px 0 0 var(--nb),0 10px 0 var(--nb),20px 0 0 var(--np)}
.pixel-corners::after{bottom:-3px;right:-3px;background:var(--ny);box-shadow:-10px 0 0 var(--no),-20px 0 0 var(--nr)}

/* animated pixel blocks background */
@keyframes floatUp{0%{transform:translateY(100vh) rotate(0deg);opacity:0}
10%{opacity:1}90%{opacity:1}100%{transform:translateY(-20px) rotate(180deg);opacity:0}}
.game-particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.game-particles span{position:absolute;display:block;width:6px;height:6px;border-radius:2px;
animation:floatUp linear infinite;opacity:0}
.game-particles span:nth-child(1){left:10%;background:var(--ng);animation-duration:18s;animation-delay:0s}
.game-particles span:nth-child(2){left:25%;background:var(--nb);animation-duration:22s;animation-delay:3s;width:4px;height:4px}
.game-particles span:nth-child(3){left:40%;background:var(--np);animation-duration:20s;animation-delay:6s;width:8px;height:8px}
.game-particles span:nth-child(4){left:55%;background:var(--ny);animation-duration:24s;animation-delay:2s;width:5px;height:5px}
.game-particles span:nth-child(5){left:70%;background:var(--nr);animation-duration:19s;animation-delay:5s}
.game-particles span:nth-child(6){left:85%;background:var(--nt);animation-duration:21s;animation-delay:8s;width:7px;height:7px}
.game-particles span:nth-child(7){left:15%;background:var(--no);animation-duration:25s;animation-delay:4s;width:4px;height:4px}
.game-particles span:nth-child(8){left:60%;background:var(--ng);animation-duration:17s;animation-delay:7s;width:5px;height:5px}

/* scanline effect */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
.gf{font-family:'Bungee',cursive}
::-webkit-scrollbar{display:none}

/* nav */
.nav{position:fixed;bottom:55px;left:0;right:0;background:linear-gradient(180deg,#0D0D1F 0%,#080816 100%);
border-top:1px solid var(--border);display:flex;z-index:99999;padding:4px 0 6px;
box-shadow:0 -4px 20px rgba(0,0,0,.5)}
.nav button{flex:1;background:none;color:var(--text3);display:flex;flex-direction:column;
align-items:center;gap:2px;padding:8px 4px;font-size:9px;font-weight:700;letter-spacing:.3px;transition:.2s}
.nav button.act{color:var(--ng);text-shadow:0 0 10px rgba(0,255,135,.4)}
.nav .ni{font-size:20px;height:24px}

/* pages */
.pg{display:none;padding:16px 16px 20px;max-width:520px;margin:0 auto}
.pg.act{display:block}

/* xp header */
.xph{background:linear-gradient(135deg,var(--card) 0%,#1E1E38 100%);border-radius:20px;padding:22px 20px;
margin-bottom:16px;border:1px solid var(--border);position:relative;overflow:hidden}
.xph::after{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;
background:radial-gradient(circle,rgba(0,255,135,.08),transparent 70%);pointer-events:none}
.lvl-badge{display:inline-flex;align-items:center;gap:6px;background:var(--card2);
padding:5px 14px;border-radius:20px;margin-bottom:12px;font-size:13px;font-weight:700}
.xp-num{font-size:32px;font-weight:800;margin-bottom:2px}
.xp-num span{font-size:14px;font-weight:600;color:var(--text2)}
.xp-label{font-size:11px;color:var(--text3);margin-bottom:8px}
.xp-track{background:var(--card2);border-radius:20px;height:10px;overflow:hidden;position:relative}
.xp-fill{height:100%;border-radius:20px;transition:width .6s cubic-bezier(.4,0,.2,1);
background:linear-gradient(90deg,var(--ng),var(--nb))}
.xp-track::after{content:'';position:absolute;inset:0;
background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,transparent 50%);border-radius:20px}

/* day cards */
.dc{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px 18px;
margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:all .2s;position:relative;overflow:hidden}
.dc.done{border-color:rgba(0,255,135,.25)}
.dc.done::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ng)}
.dc.locked{opacity:.4;pointer-events:none}
.dc-icon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;
font-size:24px;flex-shrink:0;position:relative}
.dc-info{flex:1;min-width:0}
.dc-title{font-size:14px;font-weight:700;margin-bottom:2px}
.dc-tag{font-size:11px;font-weight:600}
.dc-xp{text-align:right;flex-shrink:0}
.dc-xp .earned{font-size:16px;font-weight:800;color:var(--ng)}
.dc-xp .label{font-size:9px;color:var(--text3);font-weight:700}
.dc-arrow{color:var(--text3);font-size:18px;flex-shrink:0}

/* detail overlay */
.overlay{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;
padding:16px 16px 40px;display:none;
background-image:
  linear-gradient(rgba(0,255,135,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,255,135,.03) 1px,transparent 1px);
background-size:24px 24px}
.overlay.open{display:block}
.overlay>*{max-width:520px;margin-left:auto;margin-right:auto}
.back-btn{background:var(--card);color:var(--text2);padding:8px 16px;border-radius:12px;
font-size:13px;font-weight:600;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px}
.detail-header{border-radius:20px;padding:24px 20px;margin-bottom:16px;position:relative;overflow:hidden}
.detail-header .emoji{font-size:40px;margin-bottom:6px}
.detail-header .tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.detail-header h2{font-size:22px;font-weight:800}
.section-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:20px;margin-bottom:12px}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;
display:flex;align-items:center;gap:6px}
.section-card p{font-size:13.5px;color:var(--text2);line-height:1.7}
.paper-alert{background:linear-gradient(135deg,#3D2800,#2D1F00);border:1px solid #6B4D00;border-radius:14px;
padding:14px 16px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start}
.paper-alert .icon{font-size:22px;flex-shrink:0}
.paper-alert p{font-size:12.5px;color:#FFD666;line-height:1.6;font-weight:600}

/* mom call */
.mom-card{background:linear-gradient(135deg,#0D2818,#0A1F14);border:1px solid #1A4D2E;border-radius:16px;
padding:20px;margin-bottom:12px}
.mom-bubble{background:rgba(0,255,135,.08);border-radius:14px;border-bottom-left-radius:4px;
padding:12px 16px;margin-bottom:8px}
.mom-bubble .who{font-size:9px;font-weight:700;color:var(--ng);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.mom-bubble p{font-size:13px;color:var(--text);font-style:italic;line-height:1.65}
.tip-box{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.15);border-radius:14px;
padding:14px 16px;margin-bottom:12px;display:flex;gap:10px}
.tip-box .icon{font-size:16px;flex-shrink:0}
.tip-box p{font-size:12px;color:var(--nb);line-height:1.6}

/* ratings */
.rate-row{margin-bottom:14px}
.rate-label{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.rate-btns{display:flex;gap:4px}
.rate-btns button{width:28px;height:28px;border-radius:8px;font-size:11px;font-weight:700;transition:.15s}
.rate-btns button.off{background:var(--card2);color:var(--text3)}
.rate-btns button.on{background:var(--ny);color:#000;transform:scale(1.08)}

/* reflection */
.refl-q{background:var(--card2);border-radius:12px;padding:12px 16px;margin-bottom:6px;
font-size:13px;color:var(--text);line-height:1.6}
.refl-q b{color:var(--ny)}

/* done btn */
.done-btn{width:100%;padding:16px;border-radius:14px;font-size:15px;font-weight:700;
color:#000;transition:all .2s;margin-top:8px;text-transform:uppercase;letter-spacing:.5px}
.done-btn.pending{background:linear-gradient(135deg,var(--ng),var(--nb));
box-shadow:0 4px 20px rgba(0,255,135,.3)}
.done-btn.pending:active{transform:scale(.97)}
.done-btn.completed{background:var(--ng);box-shadow:0 4px 20px rgba(0,255,135,.2);animation:glow 2s infinite}

/* achievements */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ach{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px;text-align:center;transition:.2s}
.ach.unlocked{border-color:rgba(0,255,135,.3);background:linear-gradient(135deg,var(--card),#1A2E1A);
box-shadow:0 0 12px rgba(0,255,135,.1)}
.ach.locked{opacity:.4}
.ach .icon{font-size:32px;margin-bottom:6px}
.ach .name{font-size:12px;font-weight:700;margin-bottom:2px}
.ach .desc{font-size:10px;color:var(--text3)}

/* mom tab */
.rules-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:20px;margin-bottom:12px}
.rules-card h3{font-size:16px;font-weight:700;margin-bottom:10px}
.rules-card p{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:10px}
.rules-card p:last-child{margin-bottom:0}

/* animations */
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(0,255,135,.3)}50%{box-shadow:0 0 20px rgba(0,255,135,.5)}}
.pop{animation:popIn .3s cubic-bezier(.4,0,.2,1)}

/* ——— RESPONSIVE ——— */

/* iPhone SE / small phones (≤375px) */
@media(max-width:375px){
  .pg{padding:12px 12px 16px}
  .rate-btns{gap:2px}
  .rate-btns button{width:24px;height:28px;font-size:10px;border-radius:6px}
  .dc{padding:12px 14px;gap:10px}
  .dc-icon{width:40px;height:40px;font-size:20px}
  .dc-title{font-size:13px}
  .xp-num{font-size:26px}
  .detail-header{padding:18px 16px}
  .detail-header h2{font-size:18px}
  .section-card{padding:16px}
  .ach-grid{gap:8px}
  .ach{padding:12px}
  .ach .icon{font-size:26px}
}

/* Tablets (≥600px) */
@media(min-width:600px){
  .pg{max-width:580px;padding:20px 24px 24px}
  .overlay{padding:24px 24px 48px}
  .xph{padding:28px 26px}
  .xp-num{font-size:38px}
  .lvl-badge{font-size:15px;padding:6px 18px}
  .dc{padding:18px 22px;border-radius:18px}
  .dc-icon{width:54px;height:54px;font-size:28px;border-radius:16px}
  .dc-title{font-size:16px}
  .dc-tag{font-size:12px}
  .dc-xp .earned{font-size:18px}
  .detail-header{padding:30px 26px;border-radius:24px}
  .detail-header .emoji{font-size:48px}
  .detail-header h2{font-size:26px}
  .section-card{padding:24px;border-radius:18px}
  .section-card p{font-size:15px}
  .rate-btns{gap:6px}
  .rate-btns button{width:34px;height:34px;font-size:13px;border-radius:10px}
  .done-btn{padding:18px;font-size:16px;border-radius:16px}
  .ach-grid{grid-template-columns:1fr 1fr 1fr;gap:12px}
  .ach{padding:20px;border-radius:18px}
  .ach .icon{font-size:38px}
  .ach .name{font-size:14px}
  .ach .desc{font-size:11px}
  .paper-alert{padding:16px 20px;border-radius:16px}
  .paper-alert p{font-size:14px}
  .mom-bubble{padding:16px 20px}
  .mom-bubble p{font-size:14.5px}
  .refl-q{padding:14px 18px;font-size:14.5px;border-radius:14px}
  .rules-card{padding:24px;border-radius:18px}
  .rules-card h3{font-size:18px}
  .rules-card p{font-size:14px}
  .nav button{font-size:10px;padding:10px 4px}
  .nav .ni{font-size:22px}
  .back-btn{font-size:14px;padding:10px 20px}
}

/* Large tablets / landscape (≥900px) */
@media(min-width:900px){
  .pg{max-width:700px;padding:24px 32px 28px}
  .overlay{padding:32px 32px 60px;max-width:700px;margin:0 auto}
  .ach-grid{grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
  .dc{gap:18px}
  .xp-num{font-size:42px}
}
</style>
</head>
<body>

<div class="game-particles"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
<div id="app" style="position:relative;z-index:1">
  <div style="text-align:center;padding:40vh 20px 0;font-family:sans-serif">
    <div style="font-size:48px;margin-bottom:12px">⚡</div>
    <div style="font-size:18px;font-weight:800;color:#00FF87;letter-spacing:1px">PROJETO IAN</div>
    <div style="font-size:12px;color:#5A5A78;margin-top:8px">Carregando...</div>
  </div>
</div>
<!-- NAV BAR: always visible, outside #app -->
<nav class="nav" id="main-nav">
  <button id="nav-home" class="act" onclick="setTab('home')"><span class="ni">🏠</span>INÍCIO</button>
  <button id="nav-missions" onclick="setTab('missions')"><span class="ni">⚔️</span>MISSÕES</button>
  <button id="nav-achs" onclick="setTab('achs')"><span class="ni">🏆</span>CONQUISTAS</button>
  <button id="nav-mom" onclick="setTab('mom')" style="display:none"><span class="ni">💛</span>MÃE</button>
</nav>
<noscript>
  <div style="text-align:center;padding:30vh 20px 0;font-family:sans-serif;color:#E8E8F0">
    <div style="font-size:48px;margin-bottom:12px">⚠️</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:8px">JavaScript necessário</div>
    <div style="font-size:13px;color:#9898B0;max-width:300px;margin:0 auto;line-height:1.6">

</noscript>

<script>
// ——— DATA ———
const LEVELS=[
  {name:"Noob",min:0,color:"#6B7280",icon:"⬜"},
  {name:"Aprendiz",min:200,color:"#00D4FF",icon:"🟦"},
  {name:"Jogador",min:500,color:"#A78BFA",icon:"🟪"},
  {name:"Mestre",min:900,color:"#FBBF24",icon:"🟨"},
  {name:"Lenda",min:1300,color:"#FF4D6A",icon:"🟥"},
];

const ACHS=[
  {id:"first",icon:"⚡",name:"Primeira Missão",desc:"Complete a 1ª missão",ck:p=>Object.values(p).some(d=>d&&d.done)},
  {id:"prof",icon:"🎤",name:"Professor Ian",desc:"Complete a missão do Professor",ck:p=>p.d2?.done},
  {id:"ten",icon:"🔥",name:"Memória 10!",desc:"Nota 10 em 'Quanto Lembrei'",ck:p=>Object.values(p).some(d=>d&&d.remember>=10)},
  {id:"w1",icon:"🏅",name:"Semana 1 Clear",desc:"Complete toda a Semana 1",ck:p=>["d1","d2","d3","d4","d5","d6"].every(i=>p[i]?.done)},
  {id:"pomo",icon:"⏱️",name:"Pomodoro Master",desc:"Complete a missão Pomodoro",ck:p=>p.d8?.done},
  {id:"hard",icon:"💪",name:"Sem Medo",desc:"Enfrente a Dificuldade Produtiva",ck:p=>p.d10?.done},
  {id:"w2",icon:"🏆",name:"Semana 2 Clear",desc:"Complete toda a Semana 2",ck:p=>["d7","d8","d9","d10","d11","d12"].every(i=>p[i]?.done)},
  {id:"formula",icon:"👑",name:"Fórmula Ian",desc:"Crie seu método de estudo",ck:p=>p.d12?.done},
];

const DAYS=[
  // WEEK 1
  {id:"d1",w:1,emoji:"📝",title:"O Resumo Escrito",tag:"Leitura + Escrita",color:"#00D4FF",bg:"#0A1E2E",
   mission:"Escolha uma matéria que você precisa estudar. Leia o conteúdo no caderno ou livro por 10 minutos. Depois FECHA TUDO e escreve no caderno, com suas palavras, o que lembrou. Não precisa ser perfeito!",
   paper:"Pegue seu caderno e uma caneta. O resumo tem que ser escrito À MÃO — nada de digitar!",
   mom:["Ian, lê pra mim o resumo que você escreveu? Quero ouvir!","De 0 a 10, quanto foi fácil lembrar pra escrever? E quanto gostou de fazer assim?"],
   tip:"O cérebro processa informação de forma diferente quando escreve à mão. Escrever força a reorganizar o conteúdo."},
  {id:"d2",w:1,emoji:"🎤",title:"O Professor Ian",tag:"Explicação Verbal",color:"#A78BFA",bg:"#1A152E",
   mission:"Estude um conteúdo por 10 minutos do jeito que quiser. Depois grave um áudio de 2-3 minutos no celular explicando o assunto como se você fosse o professor. Manda o áudio pra mãe!",
   paper:"Antes de gravar, faça um ROTEIRO no caderno — liste os 3-5 pontos que quer explicar na ordem certa.",
   mom:["Ouvi seu áudio! Você explicou [cite algo que ele disse]. Me conta: foi fácil organizar na cabeça pra explicar?","De 0 a 10, quanto lembrou e quanto gostou?"],
   tip:"Autoexplicação é das técnicas mais eficazes. Inverte o papel: de quem 'não sabe' pra quem ensina!"},
  {id:"d3",w:1,emoji:"🎨",title:"O Mapa Visual",tag:"Visual + Espacial",color:"#14F0C0",bg:"#0A2420",
   mission:"Pegue uma folha EM BRANCO e desenhe um mapa mental: tema no centro, ramificações com subtemas. Use cores diferentes, setas, desenhos. Não precisa ser artístico — é pra organizar ideias. Tire foto e manda pra mãe!",
   paper:"Folha branca (sem linha) + canetas coloridas ou lápis de cor. Quanto mais visual, melhor!",
   mom:["Vi seu mapa! Me explica como você organizou — por que esse galho saiu daqui?","De 0 a 10, quanto lembrou e quanto gostou?"],
   tip:"Mapa mental obriga o cérebro a criar hierarquia e conexões entre conceitos."},

// ——— STATE ———
let state={tab:"home",week:1,detail:null,showMom:false,momUnlocked:false,progress:{}};
const LS_KEY="projeto-ian-v2";
const MOM_PIN="1234";
let tapCount=0;let tapTimer=null;
function secretTap(){
  tapCount++;
  clearTimeout(tapTimer);
  // Visual feedback - subtle flash on the ⚡ element
  var el=document.getElementById('secret-bolt');
  if(el){el.style.transform='scale(1.2)';setTimeout(function(){el.style.transform='scale(1)';},150);}
  tapTimer=setTimeout(function(){tapCount=0;},2000);
  if(tapCount>=5){
    tapCount=0;
    setTimeout(function(){
      var pin=prompt("🔒 Senha de acesso:");
      if(pin===MOM_PIN){state.momUnlocked=true;state.tab="mom";render();}
      else if(pin!==null){alert("Senha incorreta!");}
    },200);
  }
}

function load(){try{const d=localStorage.getItem(LS_KEY);if(d)state.progress=JSON.parse(d);}catch(e){}}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(state.progress));}catch(e){}}

function getXP(){
  let xp=0;
  DAYS.forEach(d=>{
    const p=state.progress[d.id];
    if(!p?.done)return;
    if(d.refl){xp+=100;}
    else{xp+=50+(p.remember||0)*5+(p.enjoyed||0)*5;}
  });
  return xp;
}
function getLevel(xp){
  let lv=LEVELS[0];
  for(const l of LEVELS)if(xp>=l.min)lv=l;
  return lv;
}
function getNextLevel(xp){
  for(const l of LEVELS)if(xp<l.min)return l;
  return null;
}
function getDoneCount(){return DAYS.filter(d=>state.progress[d.id]?.done).length;}

// ——— RENDER ———
function updateNav(){
  var nav=document.getElementById("main-nav");
  if(!nav)return;
  // Hide nav when in detail view
  nav.style.display=state.detail?"none":"flex";
  // Update active states
  var tabs=["home","missions","achs","mom"];
  tabs.forEach(function(t){
    var btn=document.getElementById("nav-"+t);
    if(btn){
      btn.className=state.tab===t?"act":"";
      if(t==="mom"){btn.style.display=state.momUnlocked?"flex":"none";}
    }
  });
}

function render(){
  var app=document.getElementById("app");
  var html="";

  if(state.detail){
    html=renderDetail();
  } else {
    html=
      '<div class="pg '+(state.tab==='home'?'act':'')+'" id="pg-home">'+renderHome()+'</div>'+
      '<div class="pg '+(state.tab==='missions'?'act':'')+'" id="pg-missions">'+renderMissions()+'</div>'+
      '<div class="pg '+(state.tab==='achs'?'act':'')+'" id="pg-achs">'+renderAchs()+'</div>'+
      (state.momUnlocked?'<div class="pg '+(state.tab==='mom'?'act':'')+'" id="pg-mom">'+renderMom()+'</div>':'');
  }
  app.innerHTML=html;
  updateNav();
}

function renderDayCard(d,i,list,weekLocked){
  const p=state.progress[d.id]||{};
  const prevDone=i===0||state.progress[list[i-1]?.id]?.done;
  const locked=weekLocked||(i>0&&!prevDone&&!p.done);
  const xpEarned=p.done?(d.refl?100:50+(p.remember||0)*5+(p.enjoyed||0)*5):0;
  return `
  <div class="dc${p.done?' done':''}${locked?' locked':''}" onclick="${locked?'':`openDay('${d.id}')`}" style="cursor:${locked?'not-allowed':'pointer'}">
    <div class="dc-icon" style="background:${d.bg}">
      ${p.done?'✅':locked?'🔒':d.emoji}
    </div>
    <div class="dc-info">
      <div class="dc-title">${d.title}</div>
      <div class="dc-tag" style="color:${d.color}">${d.tag}</div>
    </div>
    ${p.done?`<div class="dc-xp"><div class="earned">+${xpEarned}</div><div class="label">XP</div></div>`
    :`<div class="dc-arrow">›</div>`}
  </div>`;
}

    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:8px;color:var(--text3);letter-spacing:3px;margin-bottom:6px">▪️▫️▪️▫️▪️▫️▪️▫️▪️▫️▪️▫️▪️▫️▪️</div>
      <h2 class="gf" style="font-size:18px;color:var(--ny)">🏆 CONQUISTAS</h2>
      <p style="font-size:12px;color:var(--text3);margin-top:4px">💎 ${ACHS.filter(a=>a.ck(state.progress)).length}/${ACHS.length} desbloqueadas</p>
    </div>
    <div class="ach-grid">
      ${ACHS.map(a=>{
        const unlocked=a.ck(state.progress);
        return `<div class="ach ${unlocked?'unlocked':'locked'}">
          <div class="icon">${a.icon}</div>
          <div class="name">${a.name}</div>
          <div class="desc">${a.desc}</div>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

function renderMom(){
  return `
  <div style="padding-top:12px">
    <button onclick="lockMom()" style="width:100%;padding:12px;border-radius:12px;background:var(--card2);
      color:var(--text2);font-size:13px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;
      justify-content:center;gap:8px;border:1px solid var(--border)">
      🔒 Sair do Modo Mãe
    </button>
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:40px;margin-bottom:4px">💛</div>
      <h2 class="gf" style="font-size:18px">GUIA DA MÃE</h2>
      <p style="font-size:12px;color:var(--text3)">Dicas pra você, mãe guerreira</p>
    </div>
    <div class="rules-card">
      <h3 style="color:var(--ny)">Regra 1: Valide antes de redirecionar</h3>
      <p>Se ele disser "eu sou burro", não diga "não é não".</p>
      <p>Diga: <span style="color:var(--ng);font-style:italic">"Eu entendo que você tá sentindo isso. Vamos ver juntos o que tá acontecendo?"</span></p>
    </div>
    <div class="rules-card">
      <h3 style="color:var(--ny)">Regra 2: Elogie o processo, nunca o talento</h3>
      <p>Em vez de "você é inteligente":</p>
      <p style="color:var(--ng);font-style:italic">"Gostei que você tentou de um jeito diferente"</p>
      <p style="color:var(--ng);font-style:italic">"Você dedicou um tempão, dá pra ver o esforço"</p>
    </div>
    <div class="rules-card">
      <h3 style="color:var(--ny)">Regra 3: Normalize a dificuldade</h3>
      <p>Conte pra ele momentos em que VOCÊ precisou de mais tempo ou esforço que outras pessoas — e como isso não te definiu.</p>
    </div>
    <div class="rules-card">
      <h3 style="color:var(--nb)">📱 Sobre a ligação</h3>
      <p>10-15 minutos, tom leve e curioso. Não é cobrança. Se ele não fez a atividade, tudo bem — pergunte sobre o dia e tenta amanhã.</p>
      <p>Abra cada missão pra ver o roteiro específico da ligação.</p>
    </div>
    <div class="rules-card">
      <h3 style="color:var(--np)">👩‍🏫 Sobre quem estuda com ele</h3>
      <p>Compartilhe este app com a pessoa que estuda com o Ian no período de provas. Se ela reforçar a mesma linguagem de processo (em vez de "vamos tirar nota boa"), o efeito multiplica.</p>
    </div>
    <div class="rules-card" style="border-color:var(--ng)33">
      <h3 style="color:var(--ng)">🔄 Resetar progresso</h3>
      <p>Se quiser recomeçar do zero:</p>
      <button onclick="if(confirm('Tem certeza? Vai apagar todo o progresso.')){state.progress={};save();render();}" style="margin-top:8px;padding:10px 20px;border-radius:10px;background:var(--card2);color:var(--nr);font-size:13px;font-weight:700">Resetar Tudo</button>
    </div>
  </div>`;
}

// ——— ACTIONS ———
function setTab(t){state.tab=t;render();window.scrollTo(0,0);}
function lockMom(){state.momUnlocked=false;state.tab="home";render();window.scrollTo(0,0);}
function openDay(id){state.detail=id;state.showMom=false;render();window.scrollTo(0,0);}
function closeDetail(){state.detail=null;state.showMom=false;render();}

function setRating(id,field,val){
  if(!state.progress[id])state.progress[id]={};
  state.progress[id][field]=val;
  save();render();
}

function toggleDone(id){
  if(!state.progress[id])state.progress[id]={};
  state.progress[id].done=!state.progress[id].done;
  save();render();
}

// ——— INIT ———
function init(){
  try{
    load();
    render();
  }catch(e){
    document.getElementById("app").innerHTML=
      '<div style="text-align:center;padding:30vh 20px 0;color:#E8E8F0;font-family:sans-serif">'+
      '<div style="font-size:48px;margin-bottom:12px">⚠️</div>'+
      '<div style="font-size:14px;color:#FF4D6A">Erro ao carregar: '+e.message+'</div>'+
      '<button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;border-radius:12px;'+
      'background:#00FF87;color:#000;font-weight:700;border:none;font-size:14px">Tentar de novo</button></div>';
  }
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}
</script>
</body>
</html>
