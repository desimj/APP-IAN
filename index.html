<style>
:root{
  --bg:#0A0A18;--surface:rgba(18,18,36,.85);--surface2:rgba(28,28,52,.9);--border:rgba(60,60,100,.3);
  --glass:rgba(255,255,255,.03);--glass2:rgba(255,255,255,.06);
  --neon:#00FF87;--blue:#00D4FF;--purple:#A78BFA;--gold:#FFD700;--red:#FF4D6A;
  --orange:#FF8C00;--pink:#FF6BCB;--teal:#14F0C0;
  --text:#F0F0FF;--text2:#A0A0C0;--text3:#5A5A78;
  --glow-green:0 0 20px rgba(0,255,135,.15);--glow-blue:0 0 20px rgba(0,212,255,.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;overflow-x:hidden;
  background-image:linear-gradient(rgba(10,10,24,.55),rgba(10,10,24,.55)),url('bg-game.png');
  background-size:cover;background-position:center;background-attachment:fixed}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
.gf{font-family:'Orbitron',monospace}
::-webkit-scrollbar{display:none}

/* ——— GLASS CARDS ——— */
.glass{background:var(--surface);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:16px}
.glass2{background:var(--surface2);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:14px}

/* ——— NAV ——— */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(8,8,20,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--border);display:flex;
  padding:2px 0 max(4px,env(safe-area-inset-bottom))}
.nav button{flex:1;background:none;color:var(--text3);display:flex;flex-direction:column;
  align-items:center;gap:2px;padding:8px 4px;font-size:9px;font-weight:700;
  letter-spacing:.4px;transition:.2s}
.nav button.act{color:var(--neon)}
.nav button .ni{font-size:18px;height:22px;transition:.2s}
.nav button.act .ni{transform:scale(1.15);filter:drop-shadow(0 0 6px rgba(0,255,135,.4))}

/* ——— PAGES ——— */
.pg{display:none;padding:16px 16px 88px;max-width:520px;margin:0 auto}
.pg.act{display:block}

/* ——— OVERLAY ——— */
.ov{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;
  padding:16px 16px 40px;display:none;
  background-image:linear-gradient(rgba(10,10,24,.55),rgba(10,10,24,.55)),url('bg-game.png');
  background-size:cover;background-position:center;background-attachment:fixed}
.ov.open{display:block}
.ov>*{max-width:520px;margin-left:auto;margin-right:auto}

/* ——— COMPONENTS ——— */
.back{background:var(--surface);color:var(--text2);padding:8px 16px;border-radius:10px;
  font-size:12px;font-weight:600;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px;
  border:1px solid var(--border)}

.xp-track{background:rgba(255,255,255,.06);border-radius:20px;height:8px;overflow:hidden;position:relative}
.xp-fill{height:100%;border-radius:20px;transition:width .8s cubic-bezier(.25,.8,.25,1);
  background:linear-gradient(90deg,var(--neon),var(--blue));position:relative}
.xp-fill::after{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.25) 0%,transparent 60%);border-radius:20px}

/* rating */
.rate-row{margin-bottom:14px}
.rate-label{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:8px;
  text-transform:uppercase;letter-spacing:.4px}
.rate-track{display:flex;gap:3px}
.rate-track button{flex:1;height:32px;border-radius:6px;font-size:11px;font-weight:700;transition:.15s}
.rate-track button.off{background:rgba(255,255,255,.04);color:var(--text3)}
.rate-track button.on{color:#000}

/* day card */
.dc{padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;
  transition:all .15s;position:relative;overflow:hidden;cursor:pointer}
.dc.done{border-color:rgba(0,255,135,.2)}
.dc.done::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--neon)}
.dc.lk{opacity:.35;pointer-events:none;cursor:not-allowed}
.dc-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0}
.dc-info{flex:1;min-width:0}
.dc-title{font-size:13px;font-weight:700;margin-bottom:1px}
.dc-tag{font-size:10px;font-weight:600}
.dc-xp{text-align:right;flex-shrink:0}

/* mission header */
.mh{border-radius:18px;padding:28px 22px;margin-bottom:14px;position:relative;overflow:hidden}
.mh .tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.mh h2{font-size:20px;font-weight:800}
.mh .lvl{font-size:9px;font-weight:700;color:rgba(255,255,255,.5);margin-top:4px;
  text-transform:uppercase;letter-spacing:.6px}

/* paper alert */
.pa{background:rgba(255,200,0,.08);border:1px solid rgba(255,200,0,.2);border-radius:12px;
  padding:12px 14px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start}
.pa p{font-size:12px;color:var(--gold);line-height:1.6;font-weight:600}

/* section */
.sec{padding:18px;margin-bottom:10px}
.sec-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;
  display:flex;align-items:center;gap:6px}

/* achievement */
.ach{text-align:center;padding:16px 10px;transition:.2s}
.ach.locked{opacity:.3}
.ach.unlocked{border-color:rgba(0,255,135,.25);box-shadow:var(--glow-green)}
.ach .ai{font-size:28px;margin-bottom:5px}
.ach .an{font-size:10px;font-weight:700;margin-bottom:2px}
.ach .ad{font-size:9px;color:var(--text3)}

/* mom */
.mom-bubble{background:rgba(0,255,135,.06);border:1px solid rgba(0,255,135,.12);
  border-radius:12px;border-bottom-left-radius:3px;padding:12px 14px;margin-bottom:8px}
.mom-bubble p{font-size:13px;font-style:italic;line-height:1.6}
.mom-who{font-size:8px;font-weight:700;color:var(--neon);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:3px}

/* reflection */
.rq{background:rgba(255,255,255,.03);border-radius:10px;padding:10px 14px;margin-bottom:5px;
  font-size:12.5px;line-height:1.6}

/* btn */
.btn-main{width:100%;padding:16px;border-radius:14px;font-size:14px;font-weight:800;
  color:#000;text-transform:uppercase;letter-spacing:.8px;transition:.2s;
  position:relative;overflow:hidden;font-family:'Orbitron',monospace}
.btn-main:active{transform:scale(.97);filter:brightness(.9)}
.btn-green{
  background:linear-gradient(180deg,#33FFaa 0%,var(--neon) 45%,#00CC6A 100%);
  box-shadow:0 4px 0 #009950,0 6px 20px rgba(0,255,135,.25);
  text-shadow:0 1px 0 rgba(255,255,255,.3)}
.btn-green:active{box-shadow:0 1px 0 #009950,0 2px 8px rgba(0,255,135,.2);transform:translateY(3px) scale(.98)}
.btn-green::after{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
  transform:skewX(-20deg);animation:shimmer 3s infinite}
@keyframes shimmer{0%{left:-60%}100%{left:120%}}
.btn-done{
  background:linear-gradient(180deg,#44FFBB 0%,var(--neon) 40%,#00DD77 100%);
  box-shadow:0 0 24px rgba(0,255,135,.3),0 4px 0 #009950,inset 0 1px 0 rgba(255,255,255,.25);
  animation:glow-btn 2s infinite;
  text-shadow:0 1px 0 rgba(255,255,255,.3)}
@keyframes glow-btn{0%,100%{box-shadow:0 0 16px rgba(0,255,135,.2),0 4px 0 #009950}
  50%{box-shadow:0 0 30px rgba(0,255,135,.4),0 4px 0 #009950}}

/* stats */
.stat-card{padding:14px;text-align:center}
.stat-num{font-family:'Orbitron',monospace;font-size:24px;font-weight:900}
.stat-label{font-size:9px;font-weight:700;color:var(--text3);margin-top:2px;
  text-transform:uppercase;letter-spacing:.4px}

/* responsive */
@media(max-width:374px){
  .pg{padding:12px 10px 88px}
  .rate-track button{height:28px;font-size:10px}
  .dc{padding:12px;gap:10px}
  .dc-icon{width:38px;height:38px;font-size:18px}
  .dc-title{font-size:12px}
  .mh{padding:22px 18px}
  .mh h2{font-size:18px}
}
@media(min-width:600px){
  .pg{max-width:580px;padding:20px 24px 92px}
  .ov{padding:24px}
  .dc{padding:16px 20px;gap:16px}
  .dc-icon{width:52px;height:52px;font-size:26px;border-radius:14px}
  .dc-title{font-size:15px}
  .mh{padding:32px 28px}
  .mh h2{font-size:24px}
  .rate-track button{height:36px;font-size:12px;border-radius:8px}
  .sec{padding:22px}
  .ach-grid{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:900px){
  .pg{max-width:680px}
  .ov>*{max-width:680px}
  .ach-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>

   tip:"Metacognição diferencia estudantes eficientes. Calibrar conhecimento reduz dependência de validação externa."},
  {id:"d12",w:2,emoji:"🏆",title:"A Fórmula Ian",tag:"Boss Final — Identidade",
   color:"#FFD700",bg:"rgba(255,215,0,.08)",refl:true,
   mission:"BOSS FINAL! Crie a SUA fórmula de estudo — o Método Ian. Vai ficar colada na parede do seu quarto como troféu!",
   paper:"Folha ESPECIAL. Decore, use cores — é seu troféu real!",
   rqs:["Meu método ideal de estudo é:","Tempo ideal por sessão: ___ minutos","Antes de estudar, eu devo:","Quando eu travo, meu plano é:","Uma coisa que descobri sobre mim:","Uma coisa que quero dizer pra minha mãe:"],
   mom:["Me lê a Fórmula Ian? Quero conhecer o método que você inventou.","Estou muito orgulhosa — não pela nota, mas porque você se conheceu. Ninguém tira isso de você."],
   tip:"Objetivo final: IDENTIDADE. Não 'burro' nem 'inteligente' — 'eu sei como funciono'. Autoestima baseada em evidência."},
];

// ——— STATE ENGINE ———
var S={tab:"home",detail:null,showMom:false,momOn:false,p:{}};
var LS="ian-game-v3";
var PIN="1234";
var taps=0,tapT=null;

function load(){try{var d=localStorage.getItem(LS);if(d)S.p=JSON.parse(d)}catch(e){}}
function save(){try{localStorage.setItem(LS,JSON.stringify(S.p))}catch(e){}}

function xp(){
  var total=0;
  DAYS.forEach(function(d){var p=S.p[d.id];if(!p||!p.done)return;
    if(d.refl){total+=120}else{total+=50+(p.remember||0)*5+(p.enjoyed||0)*5}});
  return total;
}
function lv(x){var l=LEVELS[0];LEVELS.forEach(function(v){if(x>=v.min)l=v});return l}
function nlv(x){for(var i=0;i<LEVELS.length;i++)if(x<LEVELS[i].min)return LEVELS[i];return null}
function done(){return DAYS.filter(function(d){return S.p[d.id]&&S.p[d.id].done}).length}

function secretTap(){
  taps++;clearTimeout(tapT);
  var el=document.getElementById("bolt");
  if(el){el.style.transform="scale(1.15)";setTimeout(function(){el.style.transform="scale(1)"},150)}
  tapT=setTimeout(function(){taps=0},2000);
  if(taps>=5){taps=0;setTimeout(function(){
    var pin=prompt("🔒 Código de acesso:");
    if(pin===PIN){S.momOn=true;S.tab="mom";render()}
    else if(pin!==null)alert("Código incorreto")
  },200)}
}

// ——— NAV ———
function updateNav(){
  var nav=document.getElementById("main-nav");if(!nav)return;
  nav.style.display=S.detail?"none":"flex";
  ["home","missions","achs","mom"].forEach(function(t){
    var b=document.getElementById("nav-"+t);if(!b)return;
    b.className=S.tab===t?"act":"";
    if(t==="mom")b.style.display=S.momOn?"flex":"none"
  })
}

// ——— RENDER ENGINE ———
function render(){
  var app=document.getElementById("app");
  if(S.detail){app.innerHTML=rDetail();updateNav();return}
  var h='<div class="pg '+(S.tab==="home"?"act":"")+'">'+ rHome()+'</div>';
  h+='<div class="pg '+(S.tab==="missions"?"act":"")+'">'+ rMissions()+'</div>';
  h+='<div class="pg '+(S.tab==="achs"?"act":"")+'">'+ rAchs()+'</div>';
  if(S.momOn)h+='<div class="pg '+(S.tab==="mom"?"act":"")+'">'+ rMom()+'</div>';
  app.innerHTML=h;updateNav()
}

// ——— HOME ———
function rHome(){
  var x=xp(),l=lv(x),n=nlv(x),d=done(),t=DAYS.length;
  var pct=n?Math.min(100,((x-l.min)/(n.min-l.min))*100):100;
  var next=DAYS.filter(function(d){return!S.p[d.id]||!S.p[d.id].done})[0];
  var w2lock=!S.p.d6||!S.p.d6.done;

  var h='<div style="text-align:center;padding:20px 0 8px">';
  h+='<div id="bolt" style="font-size:44px;cursor:default;user-select:none;transition:transform .15s" onclick="secretTap()">⚡</div>';
  h+='<h1 class="gf" style="font-size:18px;letter-spacing:2px;margin-top:4px;background:linear-gradient(90deg,var(--neon),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent">PROJETO IAN</h1>';
  h+='<p style="font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:1px">A JORNADA DO ESTUDANTE</p></div>';

  // XP card
  h+='<div class="glass" style="padding:20px;margin-bottom:12px">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  h+='<div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">'+l.icon+'</span>';
  h+='<div><div class="gf" style="font-size:11px;color:'+l.color+';letter-spacing:1px">'+l.name.toUpperCase()+'</div>';
  h+='<div style="font-size:9px;color:var(--text3)">'+l.tier+'</div></div></div>';
  h+='<div class="gf" style="font-size:24px;color:var(--neon)">'+x+'<span style="font-size:11px;color:var(--text2)"> XP</span></div></div>';
  h+='<div class="xp-track"><div class="xp-fill" style="width:'+pct+'%"></div></div>';
  h+='<div style="font-size:9px;color:var(--text3);margin-top:6px;text-align:right">'+(n?(n.min-x)+' XP → '+n.name:'NÍVEL MÁXIMO')+'</div></div>';

  // Stats
  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">';
  h+='<div class="glass stat-card"><div class="stat-num" style="color:var(--neon)">'+d+'</div><div class="stat-label">Missões</div></div>';
  h+='<div class="glass stat-card"><div class="stat-num" style="color:var(--gold)">'+ACHS.filter(function(a){return a.ck(S.p)}).length+'</div><div class="stat-label">Troféus</div></div>';
  h+='<div class="glass stat-card"><div class="stat-num" style="color:var(--blue)">'+Math.round(d/t*100)+'%</div><div class="stat-label">Progresso</div></div></div>';

  // Next mission
  if(next){
    var locked=next.w===2&&w2lock;
    h+='<div class="glass" style="padding:18px">';
    h+='<div class="gf" style="font-size:9px;color:var(--neon);letter-spacing:1.5px;margin-bottom:10px">PRÓXIMA MISSÃO</div>';
    h+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">';
    h+='<div style="width:48px;height:48px;border-radius:14px;background:'+next.bg+';display:flex;align-items:center;justify-content:center;font-size:26px">'+next.emoji+'</div>';
    h+='<div><div style="font-size:14px;font-weight:700">'+next.title+'</div>';
    h+='<div style="font-size:10px;color:'+next.color+';font-weight:600">'+next.tag+'</div></div></div>';
    if(locked){h+='<div style="padding:10px;background:rgba(255,140,0,.08);border-radius:10px;font-size:11px;color:var(--orange);text-align:center">🔒 Complete a Semana 1 para desbloquear</div>'}
    else{h+='<button class="btn-main btn-green" onclick="openDay(\''+next.id+'\')">⚡ INICIAR MISSÃO</button>'}
    h+='</div>'
  } else {
    h+='<div class="glass" style="padding:24px;text-align:center;border-color:rgba(0,255,135,.2)">';
    h+='<div style="font-size:40px;margin-bottom:8px">🎉</div>';
    h+='<div class="gf" style="font-size:14px;color:var(--neon);letter-spacing:1px">JORNADA COMPLETA!</div>';
    h+='<p style="font-size:12px;color:var(--text2);margin-top:6px">A Fórmula Ian é seu troféu permanente.</p></div>'
  }
  return h
}

// ——— MISSIONS LIST ———
function rMissions(){
  var w2lock=!S.p.d6||!S.p.d6.done;
  var h='<div style="text-align:center;padding:12px 0 14px">';
  h+='<div class="gf" style="font-size:14px;color:var(--blue);letter-spacing:1.5px">CAPÍTULO 1</div>';
  h+='<div style="font-size:18px;font-weight:800;margin-top:2px">Descoberta</div>';
  h+='<div style="font-size:10px;color:var(--text3);margin-top:2px">Descubra como você aprende melhor</div></div>';

  var w1=DAYS.filter(function(d){return d.w===1});
  var w2=DAYS.filter(function(d){return d.w===2});
  w1.forEach(function(d,i){h+=rDayCard(d,i,w1,false)});

  h+='<div style="text-align:center;padding:18px 0 14px">';
  h+='<div class="gf" style="font-size:14px;color:var(--purple);letter-spacing:1.5px">CAPÍTULO 2</div>';
  h+='<div style="font-size:18px;font-weight:800;margin-top:2px">Autonomia</div>';
  h+='<div style="font-size:10px;color:var(--text3);margin-top:2px">Assuma o controle dos seus estudos</div></div>';

  if(w2lock)h+='<div class="glass" style="padding:12px;text-align:center;font-size:11px;color:var(--orange);margin-bottom:10px">🔒 Complete o Boss da Semana 1 para desbloquear</div>';
  w2.forEach(function(d,i){h+=rDayCard(d,i,w2,w2lock)});
  return h
}

function rDayCard(d,i,list,wLock){
  var p=S.p[d.id]||{};
  var prev=i===0||S.p[list[i-1].id]&&S.p[list[i-1].id].done;
  var locked=wLock||(i>0&&!prev&&!p.done);
  var earned=p.done?(d.refl?120:50+(p.remember||0)*5+(p.enjoyed||0)*5):0;
  var isBoss=d.tag&&d.tag.indexOf("Boss")>=0;

  var cls="glass dc"+(p.done?" done":"")+(locked?" lk":"");
  var h='<div class="'+cls+'" onclick="'+(locked?"":"openDay('"+d.id+"')")+'"'+(isBoss?' style="border-color:rgba(255,215,0,.15)"':'')+'>';
  h+='<div class="dc-icon" style="background:'+d.bg+'">'+(!locked?(p.done?"✅":d.emoji):"🔒")+'</div>';
  h+='<div class="dc-info"><div class="dc-title">'+d.title+'</div>';
  h+='<div class="dc-tag" style="color:'+d.color+'">'+d.tag+'</div></div>';
  if(p.done)h+='<div class="dc-xp"><div class="gf" style="font-size:14px;color:var(--neon)">+'+earned+'</div><div style="font-size:8px;color:var(--text3);font-weight:700">XP</div></div>';
  else if(!locked)h+='<div style="color:var(--text3);font-size:16px">›</div>';
  h+='</div>';return h
}

// ——— DETAIL ———
function rDetail(){
  var d=null;DAYS.forEach(function(v){if(v.id===S.detail)d=v});
  if(!d)return"";var p=S.p[d.id]||{};
  var isBoss=d.tag&&d.tag.indexOf("Boss")>=0;
  var lvNum=DAYS.indexOf(d)+1;

  if(S.showMom){
    var h='<div class="ov open" style="display:block;position:relative">';
    h+='<button class="back" onclick="S.showMom=false;render()">← Voltar</button>';
    h+='<div style="text-align:center;margin-bottom:16px"><div style="font-size:36px">📱</div>';
    h+='<div style="font-size:16px;font-weight:800;margin-top:4px">Roteiro da Ligação</div>';
    h+='<div style="font-size:11px;color:var(--text3)">Frases-guia — Nível '+lvNum+'</div></div>';
    h+='<div class="glass" style="padding:18px;margin-bottom:12px">';
    d.mom.forEach(function(m){
      h+='<div class="mom-bubble"><div class="mom-who">Você diz:</div><p>"'+m+'"</p></div>'
    });
    h+='</div>';
    if(d.tip){h+='<div class="glass" style="padding:14px;display:flex;gap:10px"><span style="font-size:15px">💡</span>';
      h+='<p style="font-size:11px;color:var(--blue);line-height:1.6">'+d.tip+'</p></div>'}
    h+='<div class="glass" style="padding:14px;margin-top:10px;display:flex;gap:10px"><span style="font-size:15px">💛</span>';
    h+='<div><p style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:3px">Lembre-se:</p>';
    h+='<p style="font-size:11px;color:var(--text2);line-height:1.6">Ligação curta (10-15 min), tom leve. Se não fez, tudo bem — pergunte sobre o dia.</p></div></div>';
    h+='</div>';return h
  }

  var h='<div class="ov open" style="display:block;position:relative">';
  h+='<button class="back" onclick="closeDay()">← Voltar</button>';

  // Header
  h+='<div class="mh glass" style="border-left:3px solid '+d.color+'">';
  h+='<div style="font-size:36px;margin-bottom:4px">'+d.emoji+'</div>';
  h+='<div class="tag" style="color:'+d.color+'">'+d.tag+'</div>';
  h+='<h2>'+d.title+'</h2>';
  h+='<div class="lvl">NÍVEL '+lvNum+' DE 12'+(isBoss?' — ⚠️ BOSS BATTLE':'')+'</div></div>';

  // Paper alert
  h+='<div class="pa"><span style="font-size:18px">✏️</span><p>'+d.paper+'</p></div>';

  // Mission briefing
  h+='<div class="sec glass"><div class="sec-label" style="color:'+d.color+'">🎯 BRIEFING DA MISSÃO</div>';
  h+='<p style="font-size:13px;color:var(--text2);line-height:1.75">'+d.mission+'</p></div>';

  // Reflection questions
  if(d.refl&&d.rqs){
    h+='<div class="sec glass"><div class="sec-label" style="color:var(--gold)">📝 DESAFIO DO BOSS</div>';
    d.rqs.forEach(function(q,i){h+='<div class="rq"><b style="color:var(--gold)">'+(i+1)+'.</b> '+q+'</div>'});
    h+='</div>'
  }

  // Mom button (hidden unless unlocked)
  if(S.momOn){
    h+='<button onclick="S.showMom=true;render()" style="width:100%;background:rgba(0,255,135,.06);border:1px solid rgba(0,255,135,.12);border-radius:12px;padding:14px;text-align:left;margin-bottom:10px">';
    h+='<div style="font-size:9px;font-weight:700;color:var(--neon);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">📱 DEBRIEF — ROTEIRO MÃE</div>';
    h+='<div style="font-size:11px;color:var(--text2)">Frases-guia para a ligação</div></button>'
  }

  // Rating (0-10 scale)
  if(!d.refl){
    h+='<div class="sec glass"><div class="sec-label" style="color:var(--gold)">⭐ AVALIAÇÃO PÓS-MISSÃO</div>';
    h+='<div class="rate-row"><div class="rate-label">Quanto lembrei? (0 = nada · 10 = tudo)</div><div class="rate-track">';
    for(var i=0;i<=10;i++){
      var on=(p.remember!==undefined&&p.remember!==null&&p.remember>=i)?true:false;
      var gc=on?"background:linear-gradient(135deg,var(--neon),var(--teal))":"";
      h+='<button class="'+(on?"on":"off")+'" style="'+gc+'" onclick="rate(\''+d.id+'\',\'remember\','+i+')">'+i+'</button>'
    }
    h+='</div></div>';
    h+='<div class="rate-row"><div class="rate-label">Quanto gostei? (0 = nada · 10 = amei)</div><div class="rate-track">';
    for(var i=0;i<=10;i++){
      var on=(p.enjoyed!==undefined&&p.enjoyed!==null&&p.enjoyed>=i)?true:false;
      var gc=on?"background:linear-gradient(135deg,var(--gold),var(--orange))":"";
      h+='<button class="'+(on?"on":"off")+'" style="'+gc+'" onclick="rate(\''+d.id+'\',\'enjoyed\','+i+')">'+i+'</button>'
    }
    h+='</div></div></div>'
  }

  // Complete button
  h+='<button class="btn-main '+(p.done?"btn-done":"btn-green")+'" onclick="toggleDone(\''+d.id+'\')">';
  h+=(p.done?"✅ MISSÃO COMPLETA":"⚡ MISSÃO CUMPRIDA")+'</button>';
  h+='</div>';return h
}

// ——— ACHIEVEMENTS ———
function rAchs(){
  var unlocked=ACHS.filter(function(a){return a.ck(S.p)}).length;
  var h='<div style="text-align:center;padding:12px 0 16px">';
  h+='<div class="gf" style="font-size:14px;color:var(--gold);letter-spacing:1.5px">TROFÉUS</div>';
  h+='<div style="font-size:10px;color:var(--text3);margin-top:4px">💎 '+unlocked+'/'+ACHS.length+' desbloqueados</div></div>';
  h+='<div class="ach-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  ACHS.forEach(function(a){
    var u=a.ck(S.p);var tc=TIER_COLORS[a.t];
    h+='<div class="glass ach'+(u?" unlocked":" locked")+'"'+(u?' style="border-color:'+tc+'33"':'')+'>';
    h+='<div class="ai">'+a.i+'</div>';
    h+='<div class="an"'+(u?' style="color:'+tc+'"':'')+'>'+a.n+'</div>';
    h+='<div class="ad">'+a.d+'</div>';
    h+='<div style="font-size:8px;font-weight:700;color:'+tc+';margin-top:4px;letter-spacing:.5px">'+TIER_NAMES[a.t]+'</div></div>'
  });
  h+='</div>';return h
}

// ——— MOM ———
function rMom(){
  var h='<button onclick="lockMom()" style="width:100%;padding:10px;border-radius:10px;background:var(--surface2);color:var(--text2);font-size:12px;font-weight:700;margin-bottom:14px;border:1px solid var(--border)">🔒 Sair do Modo Mãe</button>';
  h+='<div style="text-align:center;margin-bottom:16px"><div style="font-size:36px">💛</div>';
  h+='<div class="gf" style="font-size:14px;margin-top:4px;letter-spacing:1px;color:var(--gold)">GUIA DA MÃE</div></div>';

  var rules=[
    {t:"Regra 1: Valide antes de redirecionar",b:'Se ele disser "eu sou burro", não diga "não é não". Diga: <em style="color:var(--neon)">"Eu entendo que você tá sentindo isso. Vamos ver juntos?"</em>'},
    {t:"Regra 2: Elogie o processo",b:'Em vez de "você é inteligente": <em style="color:var(--neon)">"Gostei que tentou de um jeito diferente"</em> ou <em style="color:var(--neon)">"Dá pra ver o esforço"</em>'},
    {t:"Regra 3: Normalize a dificuldade",b:"Conte momentos em que VOCÊ precisou de mais tempo que outras pessoas — e como isso não te definiu."},
    {t:"Sobre a ligação",b:"10-15 min, tom leve e curioso. Não é cobrança. Se não fez, pergunte sobre o dia e tenta amanhã."},
    {t:"Sobre quem estuda com ele",b:"Compartilhe este app com a pessoa que estuda com o Ian. Se reforçar a mesma linguagem de processo, o efeito multiplica."},
  ];
  rules.forEach(function(r){
    h+='<div class="glass" style="padding:18px;margin-bottom:8px"><h3 style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px">'+r.t+'</h3>';
    h+='<p style="font-size:12px;color:var(--text2);line-height:1.7">'+r.b+'</p></div>'
  });

  h+='<div class="glass" style="padding:18px;margin-bottom:8px;border-color:rgba(255,77,106,.2)"><h3 style="font-size:14px;font-weight:700;color:var(--red);margin-bottom:8px">🔄 Resetar progresso</h3>';
  h+='<p style="font-size:12px;color:var(--text2);margin-bottom:10px">Apaga todo o progresso do Ian.</p>';
  h+='<button onclick="if(confirm(\'Tem certeza? Apaga tudo.\')){S.p={};save();render()}" style="padding:8px 16px;border-radius:8px;background:rgba(255,77,106,.1);color:var(--red);font-size:12px;font-weight:700;border:1px solid rgba(255,77,106,.2)">Resetar</button></div>';
  return h
}

// ——— ACTIONS ———
function go(t){S.tab=t;render();window.scrollTo(0,0)}
function lockMom(){S.momOn=false;S.tab="home";render();window.scrollTo(0,0)}
function openDay(id){S.detail=id;S.showMom=false;render();window.scrollTo(0,0)}
function closeDay(){S.detail=null;S.showMom=false;render()}
function rate(id,f,v){if(!S.p[id])S.p[id]={};S.p[id][f]=v;save();render()}
function toggleDone(id){if(!S.p[id])S.p[id]={};S.p[id].done=!S.p[id].done;save();render()}

// ——— INIT ———
function init(){try{load();render()}catch(e){
  document.getElementById("app").innerHTML='<div style="text-align:center;padding:30vh 20px;color:var(--text)">'+
  '<p style="color:var(--red)">Erro: '+e.message+'</p>'+
  '<button onclick="location.reload()" style="margin-top:12px;padding:10px 20px;border-radius:10px;background:var(--neon);color:#000;font-weight:700;border:none">Recarregar</button></div>'
}}
if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",init);else init();
</script>
</body>
</html>
